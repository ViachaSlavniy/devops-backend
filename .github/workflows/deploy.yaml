name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    uses: ./.github/workflows/pr-check.yaml

  deploy:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Деплой с использованием SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp/backend
            git pull origin main
            cd /var/www/myapp
            docker compose up --build -d backend

  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Echo objects values
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
          VARS_CONTEXT: ${{ toJSON(vars) }}
          INPUTS_CONTEXT: ${{ toJSON(inputs) }}
          STEPS_CONTEXT: ${{ toJSON(steps) }}
          RUNNER_CONTEXT: ${{ toJSON(runner) }}
        run: |
          echo "GITHUB_CONTEXT - ${{ GITHUB_CONTEXT }}"
          echo "NEEDS_CONTEXT - ${{ NEEDS_CONTEXT }}"
          echo "SECRETS_CONTEXT - ${{ SECRETS_CONTEXT }}"
          echo "VARS_CONTEXT - ${{ VARS_CONTEXT }}"
          echo "INPUTS_CONTEXT - ${{ INPUTS_CONTEXT }}"
          echo "STEPS_CONTEXT - ${{ STEPS_CONTEXT }}"
          echo "RUNNER_CONTEXT - ${{ RUNNER_CONTEXT }}"


  notify:
    needs: [checks, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Telegram
        run: |
          CHECKS="${{ needs.checks.result }}"
          DEPLOY="${{ needs.deploy.result }}"
          
          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ Тесты упали%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Деплой упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }}"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT"
