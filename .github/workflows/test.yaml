name: Test

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        node-version: [22, 24]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run:
          npm run test